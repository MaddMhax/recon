<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recon — Mon profil</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand" title="Liste des projets">RECON<span>_</span></a>
    <nav>
      <a href="/">Projets</a>
      <a href="/admin" id="navAdmin" class="hidden">Administration</a>
      <button class="user-btn" id="profileBtn" type="button" title="Mon profil">
        <span class="user-chip" id="navAvatar"></span>
        <span class="user" id="navUser"></span>
      </button>
      <button class="theme-toggle secondary small" type="button" title="Thème clair / sombre">☀️</button>
      <button class="secondary small" id="logoutBtn">Déconnexion</button>
    </nav>
  </header>

  <main>
    <div class="profile-wrap">
      <div class="row">
        <a href="/" class="btn secondary small">← Projets</a>
      </div>
      <h1 style="margin-top:10px">Mon profil</h1>
      <p class="subtitle" id="accountLine"></p>

      <!-- ============ Apparence (couleur + photo) ============ -->
      <div class="panel">
        <h2 style="margin-top:0">Apparence</h2>
        <label>Couleur</label>
        <div class="row"><input type="color" id="pmColor" /><span class="muted small" id="pmColorHex"></span></div>
        <label>Photo de profil <span class="muted">(JPEG / PNG, max 2 Mo)</span></label>
        <div class="row">
          <span id="pmPreview" class="pchip pchip-lg"></span>
          <input type="file" id="pmFile" accept="image/png,image/jpeg" style="width:auto" />
        </div>
        <div class="row" style="margin-top:12px">
          <button id="pmSave" type="button">Enregistrer</button>
          <button class="secondary" id="pmRemove" type="button">Retirer la photo</button>
        </div>
        <div class="error" id="pmError"></div>
      </div>

      <!-- ============ Sécurité (mot de passe) ============ -->
      <div class="panel" id="securityPanel">
        <h2 style="margin-top:0">Sécurité</h2>
        <form id="passwordForm">
          <label for="curPwd">Mot de passe actuel</label>
          <input type="password" id="curPwd" autocomplete="current-password" required />
          <label for="newPwd">Nouveau mot de passe <span class="muted">(8 caractères min.)</span></label>
          <input type="password" id="newPwd" autocomplete="new-password" minlength="8" required />
          <label for="newPwd2">Confirmer le nouveau mot de passe</label>
          <input type="password" id="newPwd2" autocomplete="new-password" minlength="8" required />
          <div class="row" style="margin-top:12px">
            <button type="submit">Changer le mot de passe</button>
          </div>
          <div class="error" id="pwError"></div>
        </form>
        <!-- Shown instead of the form for SSO-provisioned accounts. -->
        <p class="muted" id="ssoPwNote" style="display:none">
          Ce compte est géré par votre fournisseur d'identité (SSO). Le mot de passe se modifie de son côté.
        </p>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/profile-page.js"></script>
</body>
</html>
