<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recon — Audits de sécurité web (OWASP WSTG)</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- ============ Écran de connexion ============ -->
  <!-- Hidden until init() resolves the session, so a refresh while logged in
       doesn't flash the login screen before the app appears. -->
  <div id="loginView" class="hidden">
    <header class="topbar">
      <div class="brand">RECON<span>_</span></div>
      <nav>
        <button class="theme-toggle secondary small" type="button" title="Thème clair / sombre">☀️</button>
      </nav>
    </header>

    <main>
      <div class="login-wrap">
        <div class="panel">
          <h1>RECON<span class="cursor">_</span></h1>
          <p class="subtitle">Connectez-vous pour accéder à l'application.</p>
          <form id="loginForm">
            <label for="email">Adresse e-mail</label>
            <input type="email" id="email" autocomplete="username" required />
            <label for="password">Mot de passe</label>
            <input type="password" id="password" autocomplete="current-password" required />
            <div style="margin-top:16px">
              <button type="submit" style="width:100%">Se connecter</button>
            </div>
            <div class="error" id="loginError"></div>
          </form>
          <div id="ssoArea" class="hidden"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- ============ Application ============ -->
  <div id="appView" class="hidden">
    <header class="topbar">
      <a href="/" class="brand" id="brandHome" title="Liste des projets">RECON<span>_</span></a>
      <nav>
        <a href="#" id="navProjects">Projets</a>
        <a href="/admin" id="navAdmin" class="hidden">Administration</a>
        <button class="user-btn" id="profileBtn" type="button" title="Mon profil">
          <span class="user-chip" id="navAvatar"></span>
          <span class="user" id="navUser"></span>
        </button>
        <button class="theme-toggle secondary small" type="button" title="Thème clair / sombre">☀️</button>
        <button class="secondary small" id="logoutBtn">Déconnexion</button>
      </nav>
    </header>
    <main id="appMain"></main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
