<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recon — Réinitialisation du mot de passe</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand" title="Accueil">RECON<span>_</span></a>
    <nav>
      <button class="theme-toggle secondary small" type="button" title="Thème clair / sombre">☀️</button>
    </nav>
  </header>

  <main>
    <div class="login-wrap">
      <div class="panel">
        <h1>Nouveau mot de passe</h1>
        <p class="subtitle" id="resetIntro">Vérification du lien…</p>

        <form id="resetForm" class="hidden">
          <label for="pwd">Nouveau mot de passe</label>
          <input type="password" id="pwd" autocomplete="new-password" minlength="8" required />
          <label for="pwd2">Confirmer le mot de passe</label>
          <input type="password" id="pwd2" autocomplete="new-password" minlength="8" required />
          <div style="margin-top:16px">
            <button type="submit" style="width:100%">Définir le mot de passe</button>
          </div>
          <div class="error" id="resetError"></div>
        </form>

        <div id="resetDone" class="hidden">
          <p>✅ Mot de passe mis à jour. Vous pouvez vous connecter.</p>
          <a href="/" class="btn">Aller à la connexion</a>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/reset.js"></script>
</body>
</html>
